# Add to ~/.codex/config.toml (or a trusted project-scoped .codex/config.toml).
#
# Put your key and repo identity directly in the [env] table below. Codex stores them
# in the config and passes them to the server on every launch, so there is no shell
# export to re-run. Replace the placeholder values.
#
# Alternative: to forward variables already set in your shell instead of hardcoding
# them, drop the [env] table and use `env_vars = ["TESSERA_API_KEY", "TESSERA_REPO"]`.
# If Codex can't find `uvx`, use its absolute path (run `which uvx`) for `command`.
[mcp_servers.tessera_memory]
command = "uvx"
args = ["--from", "tessera-mcp", "tessera-mcp"]

[mcp_servers.tessera_memory.env]
TESSERA_API_KEY = "tsk_live_..."
TESSERA_REPO = "repo:my-app"
