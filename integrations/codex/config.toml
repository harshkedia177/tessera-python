# Add to ~/.codex/config.toml (or a trusted project-scoped .codex/config.toml).
#
# Setup is two short steps and there is nothing to declare per repo:
#   1. Add the block below.
#   2. Save your key once:  uvx --from tessera-mcp tessera-mcp login
#      (it is stored in ~/.tessera/credentials.json and reused everywhere).
#
# Repo isolation is automatic: the server namespaces memory by the git `origin`
# remote (owner/repo), falling back to the folder name. You never set a repo name.
#
# If Codex can't find `uvx`, use its absolute path (run `which uvx`) for `command`.
[mcp_servers.tessera_memory]
command = "uvx"
args = ["--from", "tessera-mcp", "tessera-mcp"]

# Optional: pin the key/namespace explicitly instead of using the stored credentials
# and auto-detection. These take precedence over both. Uncomment to use.
# [mcp_servers.tessera_memory.env]
# TESSERA_API_KEY = "tsk_live_..."
# TESSERA_REPO = "repo:my-app"   # only to override the auto-detected repo
