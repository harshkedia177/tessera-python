[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tessera-mcp"
dynamic = ["version"]
description = "MCP server exposing Tessera memory to AI coding agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "tessera-memory>=0.1",
    "mcp>=1.2",
]

[project.scripts]
tessera-mcp = "tessera_mcp.server:main"

[tool.hatch.version]
# Single source of truth: __version__ in _version.py (no second hardcoded string to drift).
path = "src/tessera_mcp/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/tessera_mcp"]
